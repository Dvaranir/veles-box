services:
  navidrome:
    image: deluan/navidrome:latest
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 10m
      ND_LOGLEVEL: info  
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
    volumes:
      - "./navidrome/data:/data:rw"
      - "./navidrome/music:/music:ro"
  
  veles-bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_USERS_WHITELIST=${TELEGRAM_USERS_WHITELIST}
      - PIXELDRAIN_TOKEN=${PIXELDRAIN_TOKEN}
      - SEARCH_PAGE_SIZE=${SEARCH_PAGE_SIZE:-10}
    env_file:
      - .env
    volumes:
      - "./navidrome/music:/bot/music:rw"
      - "./:/project:r"
    restart: unless-stopped

  music-backend:
    build:
      context: .
      dockerfile: music-backend/Dockerfile
    environment:
      - MUSIC_BACKEND_PUBLIC_HOST=music-backend.dvaranir.com
      # The Express process is internal; Caddy is the only public listener.
      - MUSIC_BACKEND_PORT=80
      - MUSIC_DIR=/app/music
      - TEMP_DIR=/app/temp
    env_file:
      - .env
    networks:
      - default
      - caddy
    volumes:
      - "./navidrome/music:/app/music:rw"
      - "./music-backend/data:/app/data:rw"
    restart: unless-stopped

networks:
  # The existing Caddy Compose project owns this external network. Override
  # CADDY_DOCKER_NETWORK in .env if that project uses another network name.
  caddy:
    external: true
    name: ${CADDY_DOCKER_NETWORK:-dnd_default}
